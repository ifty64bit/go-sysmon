# release.yml
#
# Triggered when a version tag (e.g. v1.0.0) is pushed.
# Builds SysMon for four platform targets in parallel, then creates a GitHub
# Release and attaches every binary as a downloadable asset.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Pre-release detection:
#   Tags containing a hyphen (v1.0.0-beta.1, v2.0.0-rc.1) are automatically
#   marked as pre-releases in the GitHub UI.

name: Build and Release

on:
  push:
    tags:
      - 'v*'

# The release job needs write access to create releases and upload assets.
permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # build
  # Runs once per matrix entry on its native runner. Each job produces a
  # single binary and uploads it as a GitHub Actions artifact so the release
  # job can collect them all.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      # Don't cancel all jobs if one platform fails.
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────────────────
          # Wails v3 uses purego + go-winloader on Windows, so CGo is not
          # required and no C compiler needs to be in PATH.
          - label:   Windows amd64
            runner:  windows-latest
            goos:    windows
            goarch:  amd64
            cgo:     "0"
            binary:  sysmon-windows-amd64.exe

          # ── Linux ─────────────────────────────────────────────────────────
          # Wails v3 on Linux uses WebKit2GTK via CGo. The system packages are
          # installed in the "Install Linux dependencies" step below.
          - label:   Linux amd64
            runner:  ubuntu-22.04
            goos:    linux
            goarch:  amd64
            cgo:     "1"
            binary:  sysmon-linux-amd64

          # ── macOS Intel ───────────────────────────────────────────────────
          # macos-13 is the last Intel (amd64) GitHub-hosted runner.
          - label:   macOS amd64
            runner:  macos-13
            goos:    darwin
            goarch:  amd64
            cgo:     "1"
            binary:  sysmon-darwin-amd64

          # ── macOS Apple Silicon ───────────────────────────────────────────
          # macos-latest resolves to an arm64 runner (M-series chip).
          - label:   macOS arm64
            runner:  macos-latest
            goos:    darwin
            goarch:  arm64
            cgo:     "1"
            binary:  sysmon-darwin-arm64

    steps:
      # ── Source ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Go ─────────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # reads the exact version from go.mod
          cache: true               # caches the module download cache

      # ── Bun ────────────────────────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Linux-only: system libraries required by Wails / WebKit2GTK ───────
      - name: Install Linux system dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      # ── Wails CLI ──────────────────────────────────────────────────────────
      # wails3 is needed to generate the frontend/bindings/ directory, which
      # is gitignored and must be recreated in every CI environment.
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Generate frontend/bindings/ from the Go service definitions.
      # The Vite plugin (wails in vite.config.js) requires this directory;
      # the build will fail if it is missing.
      - name: Generate Wails bindings
        run: wails3 generate bindings

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      # ── Go binary ──────────────────────────────────────────────────────────
      # -s -w strips debug symbols and DWARF info, reducing binary size
      # by roughly 25–30% with no effect on runtime behaviour.
      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/${{ matrix.binary }} .
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}

      # ── Upload ─────────────────────────────────────────────────────────────
      # Each artifact is named after its binary so the download step in the
      # release job can merge them all into a single directory cleanly.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name:              ${{ matrix.binary }}
          path:              bin/${{ matrix.binary }}
          if-no-files-found: error
          retention-days:    1   # Artifacts are only needed until the release is created.

  # ──────────────────────────────────────────────────────────────────────────
  # release
  # Waits for all build jobs to succeed, then creates a GitHub Release and
  # attaches every binary as a downloadable asset.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build   # Only runs if every build job succeeded.

    steps:
      # Download all four artifacts into a single flat directory.
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path:           dist
          merge-multiple: true   # Flatten per-artifact subdirectories into dist/

      # Sanity check — log what we're about to publish.
      - name: List release assets
        run: ls -lh dist/

      # Create the release. softprops/action-gh-release reads the tag name
      # from GITHUB_REF automatically and uses GitHub's API to generate
      # release notes from merged PRs and commits since the previous tag.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files:                 dist/*
          generate_release_notes: true
          draft:                 false
          # Tags containing a hyphen are treated as pre-releases.
          # e.g. v1.0.0-beta.1 → pre-release, v1.0.0 → full release
          prerelease: ${{ contains(github.ref_name, '-') }}
